<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lung Disease Classifier</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #081120; color: #f5f7fb; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }
    .card { background: #111d33; border-radius: 20px; padding: 28px; box-shadow: 0 20px 40px rgba(0,0,0,.25); }
    h1 { margin-top: 0; }
    .btn { display: inline-block; margin-top: 12px; padding: 10px 16px; background: #3b82f6; color: white; text-decoration: none; border-radius: 10px; }
    code { background: #0f172a; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Lung Disease Classifier</h1>
      <p>This project uses a PyTorch CNN to provide a quick pneumonia screening result from a chest X-ray image.</p>
      <p>Run it locally with:</p>
      <code>python app.py</code>
      <p><a class="btn" href="https://github.com/ishvi789/Lung-disease-prediction-system" target="_blank" rel="noreferrer">View GitHub Repository</a></p>
      <p>Also included: a Gradio web app, a prediction helper, and simple tests.</p>
    </div>
  </div>
</body>
</html>
